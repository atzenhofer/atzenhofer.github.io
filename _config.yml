# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: atzenhofer.github.io
email: f.atzenhofer@gmx.at
description: >- # this means to ignore newlines until "baseurl:"
  Updates from the world of language processing, research software design, and Digital Humanities.
twitter_username: f_atzenhofer
github_username: atzenhofer
minimal_mistakes_skin: neon
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "Florian Atzenhofer-Baumgartner"
  avatar : "/assets/images/smollest.png"
  bio    : "Updates from the world of language processing, research software design, and Digital Humanities."
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square" #https://fontawesome.com/icons?d=gallery
      url: "https://twitter.com/f_atzenhofer"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/atzenhofer"
    - label: "Discord"
      icon: "fa-brands fa-discord"
      url: "https://github.com/atzenhofer"
    - label: "Website"
      icon: "fa-regular fa-building-columns"
      url: "https://personensuche.uni-graz.at/de/?tx_unigrazonline_personsearch%5BcontentUid%5D=51143&tx_unigrazonline_personsearch%5Bcontroller%5D=PersonSearch&tx_unigrazonline_personsearch%5BpersonId%5D=229D4413CC9076A3&cHash=9ecee24d2a0f58ec2ca70ab79f8e2571"
    
    # - label: "Instagram"
    #   icon: "fab fa-fw fa-instagram"
    #   url: "https://instagram.com/"

footer:
  # links:
  #   - label: "Twitter"
  #     icon: "fab fa-fw fa-twitter-square"
  #     url: "https://twitter.com/"
  #   - label: "GitHub"
  #     icon: "fab fa-fw fa-github"
  #     url: "https://github.com/"
  #   - label: "Instagram"
  #     icon: "fab fa-fw fa-instagram"
  #     url: "https://instagram.com/"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
